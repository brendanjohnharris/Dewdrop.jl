# Shared test-problem specification for the simulator comparison. Every simulator (Dewdrop, Brian2,
# BrainPy, …) reads THIS file and builds the SAME network, so the comparison is apples-to-apples. No
# simulator-specific code lives here: each simulator's `run` script implements this spec in its own
# language and writes the standard output CSVs (see README.md).
#
# Problem: a recurrent E/I AdEx network with fixed in-degree and CUBA exponential synapses; it
# exercises the real SNN bottleneck (the sparse synaptic scatter). The connectome is generated by a
# language-agnostic splitmix64 algorithm (below) so every simulator builds the IDENTICAL graph.

[problem]
name = "ei_adex"
dt = 0.1                  # integration step (ms)
T = 500.0                 # duration for the throughput runs (ms)
T_correctness = 1000.0    # duration for the statistics (rate, CV-ISI) run (ms)
# A doubling range (one point per octave) so the throughput scan reveals SCALING behaviour (log-log).
Ns = [2000, 4000, 8000, 16000, 32000, 64000, 128000, 256000, 512000]
N_correctness = 8000      # network size for the statistics run

[network]
ne_frac = 0.8             # fraction excitatory
K = 100                   # fixed in-degree (presynaptic sources per neuron)
seed = 1234               # connectome seed (see [connectome])

# AdEx neuron (BrainPy parameterisation; Dewdrop maps gL = 1/R, C = tau/R). Membrane in mV, C in pF,
# gL in nS, currents in pA, times in ms.
[neuron]
C = 200.0
gL = 10.0
EL = -70.0
VT = -50.0
dT = 2.0
Vr = -58.0
Vpeak = -40.0
a = 0.0
b = 40.0
tauw = 100.0
tref = 0.0

# CUBA exponential synapse + constant external drive. E weight +GE, I weight -GI (a single signed
# current accumulator), synaptic time constant tau (ms), conduction delay in integration steps.
[synapse]
GE = 0.10
GI = 0.50
tau = 5.0
delay_steps = 2
I_ext = 400.0

# Connectome: for each postsynaptic neuron j (0-indexed) draw K DISTINCT presynaptic sources from
# [0, N), excluding self, using a splitmix64 stream seeded per-j (identical in any language).
#
#   const MASK = 2^64 - 1
#   splitmix64(s):  s = (s + 0x9e3779b97f4a7c15) & MASK
#                   z = s
#                   z = ((z ^ (z >> 30)) * 0xbf58476d1ce4e5b9) & MASK
#                   z = ((z ^ (z >> 27)) * 0x94d049bb133111eb) & MASK
#                   return (z ^ (z >> 31)) & MASK, s
#   for j in 0:N-1:
#       state = (seed + j*0x9e3779b97f4a7c15) & MASK   # per-j independent stream
#       while |sources(j)| < K:
#           z, state = splitmix64(state)
#           pre = z % N
#           if pre != j and pre not in sources(j): add pre
#   edge (pre, post=j) weight = (pre < ne_frac*N ? +GE : -GI), delay = delay_steps
[connectome]
algorithm = "splitmix64-fixed-indegree"
